<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IRL — Spill Something</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: 'Andale Mono', 'Courier New', Courier, monospace;
  color: #FBFFE7;
  cursor: default;
  user-select: none;
}


/* ── header ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  text-align: center;
  padding-top: 52px;
}

#header h1 {
  font-size: 30px;
  font-weight: 400;
  letter-spacing: 10px;
  text-transform: uppercase;
}

#header .sub {
  margin-top: 18px;
  font-size: 14px;
  letter-spacing: 5px;
  opacity: 0.55;
}

/* ── back button ── */
#btn-back {
  position: fixed;
  top: 28px; left: 36px;
  font-family: 'Andale Mono', 'Courier New', Courier, monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: #FBFFE7;
  opacity: 0.45;
  background: none;
  border: none;
  cursor: none;
  z-index: 20;
  transition: opacity 0.2s;
}
#btn-back:hover { opacity: 1; }
#btn-back { cursor: pointer; }

/* ── photos ── */
.photo {
  position: absolute;
  cursor: grab;
  will-change: transform;
  transition: box-shadow 0.15s ease;
}
.photo img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  draggable: false;
}
.photo.dragging {
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  z-index: 100 !important;
}

/* ── footer ── */
#footer {
  position: fixed;
  bottom: 62px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  letter-spacing: 3px;
  color: #FBFFE7;
  pointer-events: none;
}

/* ── mobile: 2×2 grid, all photos on one screen ── */
@media (max-width: 768px) {
  #p1 { width: 42vw !important; height: 48vw !important; left: 4vw  !important; top: 16vh !important; transform: rotate(-4deg)  !important; }
  #p2 { width: 42vw !important; height: 48vw !important; left: 54vw !important; top: 18vh !important; transform: rotate(6deg)   !important; }
  #p3 { width: 42vw !important; height: 48vw !important; left: 4vw  !important; top: 52vh !important; transform: rotate(-2deg)  !important; }
  #p4 { width: 42vw !important; height: 48vw !important; left: 54vw !important; top: 55vh !important; transform: rotate(4deg)   !important; }
}
</style>
</head>
<body>

<button id="btn-back" onclick="history.back()">← back</button>

<div id="header">
  <h1>Documenting my cups</h1>
</div>

<!--
  ↓ Replace cup1.jpg – cup4.jpg with your actual filenames.
    Put the images in the same folder as this HTML.
-->
<div class="photo" id="p1" style="width:220px; height:250px; left:80px;  top:210px; transform:rotate(-4deg);  z-index:4;">
  <img src="cup1.jpg" />
</div>
<div class="photo" id="p2" style="width:205px; height:235px; left:340px; top:265px; transform:rotate(8deg);   z-index:3;">
  <img src="cup2.jpg" />
</div>
<div class="photo" id="p3" style="width:215px; height:245px; left:650px; top:210px; transform:rotate(-2deg);  z-index:2;">
  <img src="cup3.jpg" />
</div>
<div class="photo" id="p4" style="width:210px; height:240px; left:1020px; top:225px; transform:rotate(5deg);  z-index:1;">
  <img src="cup4.jpg" />
</div>

<p id="footer">(try moving things around)</p>

<script>
// ── draggable photos ──
let topZ    = 10;
let dragged = null;
let offX    = 0, offY = 0;
let startRot = 0;

function startDrag (el, clientX, clientY) {
  dragged = el;
  topZ++;
  el.style.zIndex = topZ;
  el.classList.add('dragging');
  offX = clientX - el.getBoundingClientRect().left;
  offY = clientY - el.getBoundingClientRect().top;
}

function moveDrag (clientX, clientY) {
  if (!dragged) return;
  dragged.style.left = (clientX - offX) + 'px';
  dragged.style.top  = (clientY - offY) + 'px';
}

function endDrag () {
  if (dragged) {
    dragged.classList.remove('dragging');
    dragged.style.cursor = 'grab';
    dragged = null;
  }
}

document.querySelectorAll('.photo').forEach(function (el) {
  el.addEventListener('mousedown', function (e) {
    startDrag(el, e.clientX, e.clientY);
    e.preventDefault();
  });
  el.addEventListener('touchstart', function (e) {
    const t = e.changedTouches[0];
    startDrag(el, t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
});

document.addEventListener('mousemove', function (e) { moveDrag(e.clientX, e.clientY); });
document.addEventListener('touchmove',  function (e) {
  if (!dragged) return;
  const t = e.changedTouches[0];
  moveDrag(t.clientX, t.clientY);
  e.preventDefault();
}, { passive: false });

document.addEventListener('mouseup',  endDrag);
document.addEventListener('touchend', endDrag);

</script>
</body>
</html>
