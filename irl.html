<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IRL — Spill Something</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: 'Andale Mono', 'Courier New', Courier, monospace;
  color: #FBFFE7;
  cursor: default;
  user-select: none;
}


/* ── header ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  text-align: center;
  padding-top: 52px;
}

#header h1 {
  font-size: 30px;
  font-weight: 400;
  letter-spacing: 10px;
  text-transform: uppercase;
}

#header .sub {
  margin-top: 18px;
  font-size: 14px;
  letter-spacing: 5px;
  opacity: 0.55;
}

/* ── back button ── */
#btn-back {
  position: fixed;
  top: 28px; left: 36px;
  font-family: 'Andale Mono', 'Courier New', Courier, monospace;
  font-size: 13px;
  letter-spacing: 2px;
  color: #FBFFE7;
  opacity: 0.45;
  background: none;
  border: none;
  cursor: none;
  z-index: 20;
  transition: opacity 0.2s;
}
#btn-back:hover { opacity: 1; }
#btn-back { cursor: pointer; }

/* ── photos ── */
.photo {
  position: absolute;
  cursor: grab;
  will-change: transform;
  transition: box-shadow 0.15s ease;
}
.photo img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  draggable: false;
}
.photo.dragging {
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  z-index: 100 !important;
}

/* ── footer ── */
#footer {
  position: fixed;
  bottom: 62px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  letter-spacing: 3px;
  color: #FBFFE7;
  pointer-events: none;
}
</style>
</head>
<body>

<button id="btn-back" onclick="history.back()">← back</button>

<div id="header">
  <h1>Documenting my cups</h1>
  <p class="sub">// send me yours!</p>
</div>

<!--
  ↓ Replace cup1.jpg – cup4.jpg with your actual filenames.
    Put the images in the same folder as this HTML.
-->
<div class="photo" id="p1" style="width:220px; height:250px; left:80px;  top:210px; transform:rotate(-4deg);  z-index:4;">
  <img src="cup1.jpg" />
</div>
<div class="photo" id="p2" style="width:205px; height:235px; left:340px; top:265px; transform:rotate(8deg);   z-index:3;">
  <img src="cup2.jpg" />
</div>
<div class="photo" id="p3" style="width:215px; height:245px; left:650px; top:210px; transform:rotate(-2deg);  z-index:2;">
  <img src="cup3.jpg" />
</div>
<div class="photo" id="p4" style="width:210px; height:240px; left:1020px; top:225px; transform:rotate(5deg);  z-index:1;">
  <img src="cup4.jpg" />
</div>

<p id="footer">(try moving things around)</p>

<script>
// ── draggable photos ──
let topZ    = 10;
let dragged = null;
let offX    = 0, offY = 0;
let startRot = 0;

document.querySelectorAll('.photo').forEach(function (el) {
  el.addEventListener('mousedown', function (e) {
    dragged  = el;
    topZ++;
    el.style.zIndex = topZ;
    el.classList.add('dragging');

    // extract current rotation from transform
    const style = window.getComputedStyle(el);
    const mat   = new DOMMatrix(style.transform);
    startRot    = Math.round(Math.atan2(mat.b, mat.a) * 180 / Math.PI);

    offX = e.clientX - el.getBoundingClientRect().left;
    offY = e.clientY - el.getBoundingClientRect().top;

    el.style.cursor = 'grabbing';
    e.preventDefault();
  });
});

document.addEventListener('mousemove', function (e) {
  if (!dragged) return;
  dragged.style.left = (e.clientX - offX) + 'px';
  dragged.style.top  = (e.clientY - offY) + 'px';
});

document.addEventListener('mouseup', function () {
  if (dragged) {
    dragged.classList.remove('dragging');
    dragged.style.cursor = 'grab';
    dragged = null;
  }
});
</script>
</body>
</html>
